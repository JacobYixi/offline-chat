<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1, user-scalable=no" />

  <!-- 字体 -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #6366F1;
      --color-primary-container:    #4338CA;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（深色科技风） === */
      --color-background:                 #0F172A;
      --color-surface-container-lowest:   #1E293B;
      --color-surface:                    #1E293B;
      --color-surface-container:          #334155;
      --color-surface-container-high:     #475569;
      --color-surface-container-highest:  #64748B;
      /* === 文字 === */
      --color-on-surface:           #F8FAFC;
      --color-on-surface-variant:   #94A3B8;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #475569;
      --color-outline-variant:  #334155;
      /* === 圆角 === */
      --radius-sm:   0.5rem;
      --radius-md:   0.75rem;
      --radius-lg:   1rem;
      --radius-xl:   1.25rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（深色模式用发光效果） === */
      --shadow-card:   0 4px 12px rgba(99,102,241,0.15);
      --shadow-float:  0 10px 25px rgba(99,102,241,0.2);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.5);
      /* === 字体 === */
      --font-sans: "Space Grotesk", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%231E293B"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%2394A3B8" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

  <!-- 雷达扫描动画 -->
  <style>
    @keyframes radar-pulse {
      0% {
        transform: scale(0.15);
        opacity: 0.7;
      }
      100% {
        transform: scale(1);
        opacity: 0;
      }
    }
    @keyframes radar-glow {
      0%, 100% {
        box-shadow: 0 0 8px rgba(99,102,241,0.4), 0 0 20px rgba(99,102,241,0.1);
      }
      50% {
        box-shadow: 0 0 16px rgba(99,102,241,0.7), 0 0 40px rgba(99,102,241,0.2);
      }
    }
    @keyframes fade-in-up {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .radar-ring {
      animation: radar-pulse 2.8s ease-out infinite;
    }
    .radar-center {
      animation: radar-glow 2s ease-in-out infinite;
    }
    .server-card {
      animation: fade-in-up 0.4s ease-out both;
    }
    .server-card:nth-child(2) { animation-delay: 0.1s; }
    .server-card:nth-child(3) { animation-delay: 0.2s; }
  </style>
</head>

<body class="bg-background text-on-surface font-sans">

  <main class="flex-1 overflow-y-auto pb-[env(safe-area-inset-bottom)]">

    <!-- @main-content:start -->

    <!-- 顶部栏：品牌 + 语言切换 -->
    <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 bg-primary/15 rounded-xl flex items-center justify-center">
          <i data-lucide="message-circle" class="w-5 h-5 text-primary"></i>
        </div>
        <span class="text-lg font-bold text-on-surface tracking-tight">OfflineChat</span>
      </div>
      <button id="btn-language" class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container active:bg-surface-container-high transition-colors" aria-label="切换语言">
        <i data-lucide="languages" class="w-5 h-5"></i>
      </button>
    </header>

    <!-- 品牌副标题 -->
    <div class="px-4 pt-1 pb-2">
      <p class="text-sm text-on-surface-variant">安全私密的离线聊天</p>
    </div>

    <!-- 页面内容 -->
    <div class="px-4 flex flex-col gap-5">

      <!-- 昵称设置区域 -->
      <div id="nickname-section" class="bg-surface rounded-xl shadow-card p-4">
        <div class="flex items-center gap-2 mb-3">
          <div class="w-7 h-7 bg-primary/10 rounded-lg flex items-center justify-center">
            <i data-lucide="user" class="w-4 h-4 text-primary"></i>
          </div>
          <h2 class="text-base font-semibold text-on-surface">设置你的昵称</h2>
        </div>
        <p class="text-xs text-on-surface-variant mb-3">其他用户将通过昵称识别你</p>
        <div class="flex gap-3">
          <input id="input-nickname" class="flex-1 min-w-0 bg-surface-container border-none rounded-xl px-4 py-3 text-base text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="输入昵称..." />
          <button id="btn-confirm-nickname" class="bg-primary text-on-primary px-5 py-3 rounded-xl text-base font-semibold hover:opacity-90 active:scale-[0.98] transition-all whitespace-nowrap">确认</button>
        </div>
        <!-- 昵称设置成功提示（默认隐藏） -->
        <div id="nickname-success" class="hidden mt-3 flex items-center gap-2 text-success">
          <i data-lucide="check-circle" class="w-4 h-4"></i>
          <span class="text-sm font-medium">昵称已设置</span>
        </div>
      </div>

      <!-- 服务端发现区域 -->
      <div id="discovery-section">

        <!-- 雷达扫描动画 -->
        <div class="flex flex-col items-center pt-4 pb-2">
          <div class="relative w-36 h-36 flex items-center justify-center">
            <!-- 脉冲环 1 -->
            <div class="radar-ring absolute inset-0 rounded-full border-2 border-primary/30" style="animation-delay: 0s;"></div>
            <!-- 脉冲环 2 -->
            <div class="radar-ring absolute inset-0 rounded-full border-2 border-primary/20" style="animation-delay: 0.9s;"></div>
            <!-- 脉冲环 3 -->
            <div class="radar-ring absolute inset-0 rounded-full border-2 border-primary/10" style="animation-delay: 1.8s;"></div>
            <!-- 静态参考圆 -->
            <div class="absolute inset-4 rounded-full border border-outline-variant/30"></div>
            <div class="absolute inset-10 rounded-full border border-outline-variant/20"></div>
            <!-- 中心发光点 -->
            <div class="radar-center w-4 h-4 bg-primary rounded-full z-10"></div>
          </div>
          <p class="text-sm text-on-surface-variant mt-3">正在搜索附近的服务端...</p>
        </div>

        <!-- 已发现的服务端列表 -->
        <div class="mt-4 mb-4">
          <h3 class="text-sm font-semibold text-on-surface-variant mb-3 px-0.5">已发现 3 个服务端</h3>

          <!-- 列表-服务端1：房主的聊天室 -->
          <div id="server-1" class="server-card bg-surface rounded-xl shadow-card p-4 mb-3 cursor-pointer hover:bg-surface-container active:bg-surface-container-high transition-colors" data-id="server-1">
            <div class="flex items-center justify-between mb-2.5">
              <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 bg-warning/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="lock" class="w-4.5 h-4.5 text-warning"></i>
                </div>
                <span class="text-base font-semibold text-on-surface">房主的聊天室</span>
              </div>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-warning/15 text-warning">需密码</span>
            </div>
            <div class="flex items-center gap-4 text-xs text-on-surface-variant">
              <div class="flex items-center gap-1.5">
                <!-- 信号强度：强 -->
                <div class="flex items-end gap-0.5 h-3.5">
                  <div class="w-1 h-1.5 bg-success rounded-sm"></div>
                  <div class="w-1 h-2.5 bg-success rounded-sm"></div>
                  <div class="w-1 h-3.5 bg-success rounded-sm"></div>
                </div>
                <span class="text-success font-medium">信号强</span>
              </div>
              <div class="flex items-center gap-1">
                <i data-lucide="users" class="w-3.5 h-3.5"></i>
                <span>5 人在线</span>
              </div>
              <div class="flex items-center gap-1 ml-auto">
                <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-on-surface-variant/50"></i>
              </div>
            </div>
          </div>

          <!-- 列表-服务端2：旅行搭子群 -->
          <div id="server-2" class="server-card bg-surface rounded-xl shadow-card p-4 mb-3 cursor-pointer hover:bg-surface-container active:bg-surface-container-high transition-colors" data-id="server-2">
            <div class="flex items-center justify-between mb-2.5">
              <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 bg-primary/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="shield-check" class="w-4.5 h-4.5 text-primary"></i>
                </div>
                <span class="text-base font-semibold text-on-surface">旅行搭子群</span>
              </div>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-primary/15 text-primary">需申请</span>
            </div>
            <div class="flex items-center gap-4 text-xs text-on-surface-variant">
              <div class="flex items-center gap-1.5">
                <!-- 信号强度：中 -->
                <div class="flex items-end gap-0.5 h-3.5">
                  <div class="w-1 h-1.5 bg-warning rounded-sm"></div>
                  <div class="w-1 h-2.5 bg-warning rounded-sm"></div>
                  <div class="w-1 h-3.5 bg-surface-container-high rounded-sm"></div>
                </div>
                <span class="text-warning font-medium">信号中</span>
              </div>
              <div class="flex items-center gap-1">
                <i data-lucide="users" class="w-3.5 h-3.5"></i>
                <span>12 人在线</span>
              </div>
              <div class="flex items-center gap-1 ml-auto">
                <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-on-surface-variant/50"></i>
              </div>
            </div>
          </div>

          <!-- 列表-服务端3：开放聊天 -->
          <div id="server-3" class="server-card bg-surface rounded-xl shadow-card p-4 mb-3 cursor-pointer hover:bg-surface-container active:bg-surface-container-high transition-colors" data-id="server-3">
            <div class="flex items-center justify-between mb-2.5">
              <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 bg-success/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="unlock" class="w-4.5 h-4.5 text-success"></i>
                </div>
                <span class="text-base font-semibold text-on-surface">开放聊天</span>
              </div>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-success/15 text-success">开放</span>
            </div>
            <div class="flex items-center gap-4 text-xs text-on-surface-variant">
              <div class="flex items-center gap-1.5">
                <!-- 信号强度：弱 -->
                <div class="flex items-end gap-0.5 h-3.5">
                  <div class="w-1 h-1.5 bg-error rounded-sm"></div>
                  <div class="w-1 h-2.5 bg-surface-container-high rounded-sm"></div>
                  <div class="w-1 h-3.5 bg-surface-container-high rounded-sm"></div>
                </div>
                <span class="text-error font-medium">信号弱</span>
              </div>
              <div class="flex items-center gap-1">
                <i data-lucide="users" class="w-3.5 h-3.5"></i>
                <span>2 人在线</span>
              </div>
              <div class="flex items-center gap-1 ml-auto">
                <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-on-surface-variant/50"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- 操作按钮区 -->
        <div class="flex flex-col gap-3 pb-4">
          <button id="btn-create-room" class="w-full bg-primary text-on-primary py-3.5 rounded-xl text-base font-semibold hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center justify-center gap-2 shadow-float">
            <i data-lucide="plus" class="w-5 h-5"></i>创建房间
          </button>
          <button id="btn-manual-ip" class="w-full bg-surface-container text-on-surface-variant border-none py-3.5 rounded-xl text-base font-semibold hover:bg-surface-container-high active:scale-[0.98] transition-all inline-flex items-center justify-center gap-2">
            <i data-lucide="keyboard" class="w-5 h-5"></i>手动输入服务端地址
          </button>
        </div>

        <!-- 手动输入 IP 区域（默认隐藏） -->
        <div id="manual-ip-section" class="hidden bg-surface rounded-xl shadow-card p-4 mb-6">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="globe" class="w-4 h-4 text-on-surface-variant"></i>
            <h3 class="text-base font-semibold text-on-surface">输入服务端地址</h3>
          </div>
          <p class="text-xs text-on-surface-variant mb-3">输入服务端的 IP 地址和端口号直接连接</p>
          <div class="flex gap-3">
            <input id="input-ip-address" class="flex-1 min-w-0 bg-surface-container border-none rounded-xl px-4 py-3 text-base text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="例如: 192.168.1.100:8080" />
            <button id="btn-connect" class="bg-primary text-on-primary px-5 py-3 rounded-xl text-base font-semibold hover:opacity-90 active:scale-[0.98] transition-all whitespace-nowrap">连接</button>
          </div>
        </div>

      </div>
    </div>

    <!-- @main-content:end -->

  </main>

  <script>
    // 导航辅助函数
    function navPush(route) {
      console.log('[原型演示] PUSH 到: ' + route);
      window.location.href = route;
    }
    function navReplace(route) {
      console.log('[原型演示] REPLACE 为: ' + route);
      window.location.replace(route);
    }
    function navReset(route) {
      console.log('[原型演示] RESET 到: ' + route);
      window.location.href = route;
    }
    function navBack() {
      console.log('[原型演示] BACK 返回上一页');
      if (window.history.length > 1) window.history.back();
    }

    $(function() {
      // 语言切换按钮 → 跳转语言设置页
      $('#btn-language').on('click', function() {
        navPush('language.html');
      });

      // 昵称确认按钮
      $('#btn-confirm-nickname').on('click', function() {
        var nickname = $('#input-nickname').val().trim();
        if (!nickname) {
          $('#input-nickname').focus();
          return;
        }
        console.log('[原型演示] 设置昵称:', nickname);
        // 显示成功提示
        $('#nickname-success').removeClass('hidden');
        // 禁用输入和按钮
        $('#input-nickname').prop('disabled', true).addClass('opacity-50');
        $('#btn-confirm-nickname').prop('disabled', true).addClass('opacity-50');
      });

      // 点击服务端卡片 → 加入服务端
      // 根据服务端类型执行不同操作：
      // - server-1（需密码）：应弹出密码输入弹窗，验证后加入
      // - server-2（需申请）：应弹出申请加入弹窗，填写申请信息后等待审批
      // - server-3（开放）：应直接加入聊天室
      $('#server-1').on('click', function() {
        console.log('[原型演示] 点击服务端: 房主的聊天室（需密码）');
        // 后续应实现：弹出底部弹窗，包含密码输入框和确认按钮
      });
      $('#server-2').on('click', function() {
        console.log('[原型演示] 点击服务端: 旅行搭子群（需申请）');
        // 后续应实现：弹出底部弹窗，包含申请信息输入框和提交按钮
      });
      $('#server-3').on('click', function() {
        console.log('[原型演示] 点击服务端: 开放聊天（开放）');
        // 后续应实现：直接跳转到聊天室页面
      });

      // 创建房间按钮 → 跳转创建房间页
      $('#btn-create-room').on('click', function() {
        navPush('createRoom.html');
      });

      // 手动输入服务端地址按钮 → 展开/收起输入区域
      $('#btn-manual-ip').on('click', function() {
        $('#manual-ip-section').toggleClass('hidden');
        if (!$('#manual-ip-section').hasClass('hidden')) {
          $('#input-ip-address').focus();
        }
      });

      // 连接按钮 → 连接手动输入的服务端
      $('#btn-connect').on('click', function() {
        var ip = $('#input-ip-address').val().trim();
        if (!ip) {
          $('#input-ip-address').focus();
          return;
        }
        console.log('[原型演示] 连接服务端:', ip);
        // 后续应实现：验证 IP 格式，尝试连接服务端，连接成功后跳转到聊天室
      });
    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
