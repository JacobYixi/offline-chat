<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1, user-scalable=no" />

  <!-- 字体 -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #6366F1;
      --color-primary-container:    #4338CA;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（深色科技风） === */
      --color-background:                 #0F172A;
      --color-surface-container-lowest:   #1E293B;
      --color-surface:                    #1E293B;
      --color-surface-container:          #334155;
      --color-surface-container-high:     #475569;
      --color-surface-container-highest:  #64748B;
      /* === 文字 === */
      --color-on-surface:           #F8FAFC;
      --color-on-surface-variant:   #94A3B8;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #475569;
      --color-outline-variant:  #334155;
      /* === 圆角 === */
      --radius-sm:   0.5rem;
      --radius-md:   0.75rem;
      --radius-lg:   1rem;
      --radius-xl:   1.25rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（深色模式用发光效果） === */
      --shadow-card:   0 4px 12px rgba(99,102,241,0.15);
      --shadow-float:  0 10px 25px rgba(99,102,241,0.2);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.5);
      /* === 字体 === */
      --font-sans: "Space Grotesk", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%231E293B"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%2394A3B8" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start -->
  <!-- 顶部导航栏：二级页面，返回按钮 + 标题 -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <button id="btn-back" class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container active:bg-surface-container-high transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </button>
    <h1 class="text-base font-semibold text-on-surface">创建房间</h1>
    <div class="w-10"></div>
  </header>
  <!-- @nav:end -->

  <main class="flex-1 overflow-y-auto pb-[calc(5.5rem+env(safe-area-inset-bottom))]">
    <!-- @main-content:start -->
    <div class="px-4 pt-2">

      <!-- 页面描述 -->
      <p class="text-sm text-on-surface-variant mb-6 px-1">配置聊天室参数，创建后其他用户即可搜索加入你的房间。</p>

      <!-- ═══════ 基本信息 ═══════ -->
      <div class="mb-6">
        <h2 class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-3 px-1">基本信息</h2>

        <!-- 房间名称 -->
        <div class="mb-4">
          <label for="input-room-name" class="text-sm font-medium text-on-surface mb-1.5 block">房间名称 <span class="text-error">*</span></label>
          <input id="input-room-name" type="text" maxlength="20" placeholder="请输入房间名称（2-20 字符）"
            class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-base text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" />
          <div class="flex justify-between items-center mt-1.5">
            <p id="error-room-name" class="text-xs text-error hidden">房间名称需要 2-20 个字符</p>
            <p id="char-count" class="text-xs text-on-surface-variant ml-auto">0/20</p>
          </div>
        </div>

        <!-- 房间密码 -->
        <div>
          <label for="input-room-password" class="text-sm font-medium text-on-surface mb-1.5 block">
            房间密码 <span class="text-xs text-on-surface-variant font-normal">（可选）</span>
          </label>
          <div class="relative">
            <input id="input-room-password" type="password" maxlength="8" inputmode="numeric" placeholder="设置 8 位数字密码保护房间"
              class="w-full bg-surface-container border-none rounded-xl px-4 py-3 pr-12 text-base text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" />
            <button id="btn-toggle-password" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container-high transition-colors">
              <i data-lucide="eye-off" id="icon-password" class="w-4 h-4"></i>
            </button>
          </div>
          <p id="error-password" class="text-xs text-error hidden mt-1.5">密码必须为 8 位数字</p>
        </div>
      </div>

      <!-- ═══════ 房间设置 ═══════ -->
      <div class="mb-6">
        <h2 class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-3 px-1">房间设置</h2>

        <div class="bg-surface rounded-xl shadow-card p-4">
          <!-- 审批开关 -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3 flex-1 min-w-0">
              <div class="w-9 h-9 rounded-full bg-primary/15 flex items-center justify-center flex-shrink-0">
                <i data-lucide="user-check" class="w-4 h-4 text-primary"></i>
              </div>
              <div class="min-w-0">
                <p class="text-sm font-medium text-on-surface">加入审批</p>
                <p class="text-xs text-on-surface-variant mt-0.5">新用户加入需房主审批</p>
              </div>
            </div>
            <!-- 开关 -->
            <div class="relative inline-flex items-center flex-shrink-0 ml-3">
              <input type="checkbox" id="toggle-approval" class="sr-only peer">
              <div class="w-12 h-7 bg-surface-container-high rounded-full peer-checked:bg-primary transition-colors duration-200"></div>
              <div class="absolute left-0.5 top-0.5 w-6 h-6 bg-white rounded-full shadow-sm transition-transform duration-200 peer-checked:translate-x-5"></div>
            </div>
          </div>

          <!-- 审批过期时间（条件显示） -->
          <div id="approval-expiry-section" class="hidden mt-4 pt-4 border-t border-outline-variant/10">
            <p class="text-sm font-medium text-on-surface mb-1">审批过期时间</p>
            <p class="text-xs text-on-surface-variant mb-3">审批请求超过此时间自动失效</p>
            <div class="grid grid-cols-2 gap-2">
              <!-- 过期选项1：永不过期（默认选中） -->
              <button id="expiry-never" class="expiry-option py-2.5 rounded-xl text-xs font-medium bg-primary text-on-primary transition-colors" data-value="never">永不过期</button>
              <!-- 过期选项2：1小时 -->
              <button id="expiry-1h" class="expiry-option py-2.5 rounded-xl text-xs font-medium bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors" data-value="1h">1 小时</button>
              <!-- 过期选项3：24小时 -->
              <button id="expiry-24h" class="expiry-option py-2.5 rounded-xl text-xs font-medium bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors" data-value="24h">24 小时</button>
              <!-- 过期选项4：7天 -->
              <button id="expiry-7d" class="expiry-option py-2.5 rounded-xl text-xs font-medium bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors" data-value="7d">7 天</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══════ 高级设置（可折叠） ═══════ -->
      <div class="mb-8">
        <button id="btn-advanced" type="button" class="w-full flex items-center justify-between py-3 px-1">
          <div class="flex items-center gap-2">
            <i data-lucide="shield-check" class="w-4 h-4 text-on-surface-variant"></i>
            <span class="text-sm font-medium text-on-surface">高级设置</span>
          </div>
          <i data-lucide="chevron-down" id="icon-advanced" class="w-4 h-4 text-on-surface-variant transition-transform duration-200"></i>
        </button>

        <div id="advanced-settings" class="hidden">
          <div class="bg-surface rounded-xl shadow-card p-4">
            <!-- 加密开关 -->
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3 flex-1 min-w-0">
                <div class="w-9 h-9 rounded-full bg-success/15 flex items-center justify-center flex-shrink-0">
                  <i data-lucide="lock" class="w-4 h-4 text-success"></i>
                </div>
                <div class="min-w-0">
                  <p class="text-sm font-medium text-on-surface">端到端加密</p>
                  <p class="text-xs text-on-surface-variant mt-0.5">消息通过加密通道传输</p>
                </div>
              </div>
              <!-- 开关（默认开启） -->
              <div class="relative inline-flex items-center flex-shrink-0 ml-3">
                <input type="checkbox" id="toggle-encryption" class="sr-only peer" checked>
                <div class="w-12 h-7 bg-surface-container-high rounded-full peer-checked:bg-primary transition-colors duration-200"></div>
                <div class="absolute left-0.5 top-0.5 w-6 h-6 bg-white rounded-full shadow-sm transition-transform duration-200 peer-checked:translate-x-5"></div>
              </div>
            </div>

            <!-- 消息伪装类型 -->
            <div class="mt-4 pt-4 border-t border-outline-variant/10">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-9 h-9 rounded-full bg-warning/15 flex items-center justify-center flex-shrink-0">
                  <i data-lucide="mask" class="w-4 h-4 text-warning"></i>
                </div>
                <div>
                  <p class="text-sm font-medium text-on-surface">消息伪装类型</p>
                  <p class="text-xs text-on-surface-variant mt-0.5">聊天内容在外部看起来像什么</p>
                </div>
              </div>
              <div id="disguise-options" class="flex flex-wrap gap-2">
                <!-- 伪装选项1：无（默认选中） -->
                <button class="disguise-option px-3.5 py-2 rounded-full text-xs font-medium bg-primary text-on-primary transition-colors" data-value="none">无</button>
                <!-- 伪装选项2：天气 -->
                <button class="disguise-option px-3.5 py-2 rounded-full text-xs font-medium bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors" data-value="weather">天气</button>
                <!-- 伪装选项3：代码 -->
                <button class="disguise-option px-3.5 py-2 rounded-full text-xs font-medium bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors" data-value="code">代码</button>
                <!-- 伪装选项4：日志 -->
                <button class="disguise-option px-3.5 py-2 rounded-full text-xs font-medium bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors" data-value="log">日志</button>
                <!-- 伪装选项5：购物清单 -->
                <button class="disguise-option px-3.5 py-2 rounded-full text-xs font-medium bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors" data-value="shopping">购物清单</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
    <!-- @main-content:end -->
  </main>

  <!-- 底部固定按钮 -->
  <div class="fixed bottom-0 left-0 right-0 z-30 bg-background/90 backdrop-blur-md px-4 pt-3 pb-[calc(1rem+env(safe-area-inset-bottom))]">
    <button id="btn-create-room" type="button"
      class="w-full bg-primary text-on-primary py-3.5 rounded-xl text-base font-semibold hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center justify-center gap-2">
      <i data-lucide="radio" class="w-5 h-5"></i>
      创建并启动房间
    </button>
  </div>

  <!-- 创建成功提示 Toast -->
  <div id="toast-success" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-success/90 backdrop-blur-sm text-white px-5 py-3 rounded-xl shadow-float flex items-center gap-2">
      <i data-lucide="check-circle" class="w-4 h-4"></i>
      <span class="text-sm font-medium">房间创建成功</span>
    </div>
  </div>

  <script>
    function navPush(route) {
      console.log('[原型演示] PUSH 到: ' + route);
      window.location.href = route;
    }
    function navReplace(route) {
      console.log('[原型演示] REPLACE 为: ' + route);
      window.location.replace(route);
    }
    function navReset(route) {
      console.log('[原型演示] RESET 到: ' + route);
      window.location.href = route;
    }
    function navBack() {
      console.log('[原型演示] BACK 返回上一页');
      if (window.history.length > 1) window.history.back();
    }

    $(function () {
      // 返回按钮 → 回到首页
      $('#btn-back').on('click', function () {
        navBack();
      });

      // ── 房间名称：字数统计 & 校验 ──
      $('#input-room-name').on('input', function () {
        var len = $(this).val().length;
        $('#char-count').text(len + '/20');
        if (len >= 2) {
          $('#error-room-name').addClass('hidden');
        }
      });

      // ── 密码显示 / 隐藏切换 ──
      $('#btn-toggle-password').on('click', function () {
        var $input = $('#input-room-password');
        var isPassword = $input.attr('type') === 'password';
        $input.attr('type', isPassword ? 'text' : 'password');
        $('#icon-password').attr('data-lucide', isPassword ? 'eye' : 'eye-off');
        lucide.createIcons();
      });

      // 密码输入时清除错误
      $('#input-room-password').on('input', function () {
        $('#error-password').addClass('hidden');
      });

      // ── 审批开关 → 显示/隐藏过期时间 ──
      $('#toggle-approval').on('change', function () {
        if ($(this).is(':checked')) {
          $('#approval-expiry-section').removeClass('hidden');
        } else {
          $('#approval-expiry-section').addClass('hidden');
        }
      });

      // ── 审批过期时间选择（单选切换） ──
      $('#approval-expiry-section').on('click', '.expiry-option', function () {
        $('.expiry-option')
          .removeClass('bg-primary text-on-primary')
          .addClass('bg-surface-container text-on-surface-variant');
        $(this)
          .removeClass('bg-surface-container text-on-surface-variant')
          .addClass('bg-primary text-on-primary');
      });

      // ── 高级设置折叠 / 展开 ──
      $('#btn-advanced').on('click', function () {
        $('#advanced-settings').toggleClass('hidden');
        $('#icon-advanced').toggleClass('rotate-180');
      });

      // ── 消息伪装类型选择（单选切换） ──
      $('#disguise-options').on('click', '.disguise-option', function () {
        $('.disguise-option')
          .removeClass('bg-primary text-on-primary')
          .addClass('bg-surface-container text-on-surface-variant');
        $(this)
          .removeClass('bg-surface-container text-on-surface-variant')
          .addClass('bg-primary text-on-primary');
      });

      // ── 创建并启动房间 ──
      $('#btn-create-room').on('click', function () {
        var roomName = $('#input-room-name').val().trim();
        var password = $('#input-room-password').val().trim();
        var valid = true;

        // 校验房间名称（必填，2-20 字符）
        if (roomName.length < 2 || roomName.length > 20) {
          $('#error-room-name').removeClass('hidden');
          valid = false;
        }

        // 校验密码（选填，若填写则必须为 8 位数字）
        if (password.length > 0 && !/^\d{8}$/.test(password)) {
          $('#error-password').removeClass('hidden');
          valid = false;
        }

        if (!valid) return;

        // 收集配置信息
        var config = {
          name: roomName,
          password: password || '无',
          approval: $('#toggle-approval').is(':checked'),
          expiry: $('.expiry-option.bg-primary').data('value') || 'never',
          encryption: $('#toggle-encryption').is(':checked'),
          disguise: $('.disguise-option.bg-primary').data('value') || 'none'
        };
        console.log('[原型演示] 创建房间配置:', config);

        // 显示成功 Toast
        $('#toast-success').removeClass('hidden');
        lucide.createIcons();

        // 1.5 秒后跳转回首页
        setTimeout(function () {
          navReset('home.html');
        }, 1500);
      });
    });
  </script>
  <script>lucide.createIcons();</script>
</body>

</html>
